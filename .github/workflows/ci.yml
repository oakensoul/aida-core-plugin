---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m venv ~/.aida/venv
          make install

      - name: Run unit tests
        run: make test TEST_ARGS="tests/unit/ tests/test_hooks.py"

      - name: Validate plugin structure
        run: |
          test -f .claude-plugin/plugin.json
          test -f skills/aida/SKILL.md
          echo "Plugin structure valid"

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m venv ~/.aida/venv
          make install

      - name: Run bootstrap integration tests
        run: make test TEST_ARGS="tests/integration/test_bootstrap_install.py"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: |
          python -m venv ~/.aida/venv
          make install
          npm install -g markdownlint-cli@0.43.0

      - name: Run all linters
        run: make lint
